<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d0d1a"/>

  <!-- Outer ring gradient effect -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#E8A87C" stroke-width="16" opacity="0.3"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#E8A87C" stroke-width="8" opacity="0.2"/>

  <!-- Track color dots -->
  <circle cx="256" cy="76" r="18" fill="#E8A87C" opacity="0.9"/>
  <circle cx="410" cy="163" r="14" fill="#6C8EBF" opacity="0.7"/>
  <circle cx="410" cy="349" r="14" fill="#7CB87C" opacity="0.7"/>

  <!-- Bold "C" letterform -->
  <text
    x="256"
    y="330"
    font-size="280"
    font-weight="900"
    text-anchor="middle"
    fill="#E8A87C"
    font-family="Georgia, 'Times New Roman', serif"
    letter-spacing="-10"
  >C</text>

  <!-- Subtle inner glow -->
  <circle cx="256" cy="256" r="80" fill="#E8A87C" opacity="0.05"/>
</svg>
